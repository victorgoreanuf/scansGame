<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veyra Bot</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="toast-container" id="toasts"></div>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-mark">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m14.5 12.5-8 8a2.12 2.12 0 1 1-3-3l8-8"/><path d="m16 16 6-6"/><path d="m8 8 6-6"/><path d="m9 7 8 8"/><path d="m21 11-8-8"/></svg>
      </div>
      <h1>Veyra Bot</h1>
      <p>Game Control Panel</p>
    </div>
    <form class="login-form" onsubmit="login(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="text" id="loginEmail" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg login-btn" id="loginBtn">Connect</button>
      <div class="login-error" id="loginError"></div>
    </form>
  </div>
</div>

<div class="app" id="mainApp" style="display:none">
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <div class="logo-mark sm">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="m14.5 12.5-8 8a2.12 2.12 0 1 1-3-3l8-8"/><path d="m16 16 6-6"/><path d="m8 8 6-6"/><path d="m9 7 8 8"/><path d="m21 11-8-8"/></svg>
        </div>
        <span class="logo-text">Veyra</span>
      </div>
      <div class="header-actions">
        <div class="status-indicator">
          <span class="dot" id="dot"></span>
          <span id="statusText">Offline</span>
        </div>
        <button class="btn btn-icon" id="refreshBtn" onclick="refreshWaves()" title="Refresh waves">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
        </button>
        <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
      </div>
    </div>
  </header>

  <nav class="tab-nav">
    <div class="tab-nav-inner">
      <button class="tab-btn active" data-tab="farming" onclick="switchTab('farming')">Farming</button>
      <button class="tab-btn" data-tab="guild" onclick="switchTab('guild')">Adventure Guild</button>
      <button class="tab-btn" data-tab="events" onclick="switchTab('events')">Events</button>
      <button class="tab-btn" data-tab="logs" onclick="switchTab('logs')">Logs</button>
    </div>
  </nav>

  <main class="content">
    <div class="tab-page" id="tab-farming">
      <div class="panel-section">
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">Profiles</span>
          </div>
          <div class="panel-body">
            <select id="profileSelect" class="f-profile">
              <option value="">Select profile...</option>
            </select>
            <div class="panel-btns">
              <button class="btn btn-xs btn-ghost" onclick="loadProfile()">Load</button>
              <button class="btn btn-xs btn-accent" onclick="saveProfile()">Save</button>
              <button class="btn btn-xs btn-ghost btn-danger" onclick="deleteProfile()">Del</button>
            </div>
          </div>
        </div>

        <div class="panel" id="pvpSection">
          <div class="panel-header">
            <span class="panel-title">
              Solo PvP
              <span class="pvp-badge off" id="pvpBadge">OFF</span>
            </span>
          </div>
          <div class="panel-body">
            <span class="pvp-stat" id="pvpStat"></span>
            <div class="pvp-btns">
              <button class="btn btn-sm btn-pvp" id="pvpStartBtn" onclick="startPvP()">Start PvP</button>
              <button class="btn btn-sm btn-red" id="pvpStopBtn" onclick="stopPvP()" style="display:none">Stop PvP</button>
            </div>
          </div>
        </div>

        <div class="panel" id="teamPvpSection" style="display:none">
          <div class="panel-header">
            <span class="panel-title">
              Team PvP
              <span class="pvp-badge off" id="teamPvpBadge">OFF</span>
            </span>
          </div>
          <div class="panel-body">
            <span class="pvp-stat" id="teamPvpStat"></span>
            <div class="pvp-btns">
              <button class="btn btn-sm btn-pvp" id="teamPvpStartBtn" onclick="startTeamPvP()">Start Team PvP</button>
              <button class="btn btn-sm btn-red" id="teamPvpStopBtn" onclick="stopTeamPvP()" style="display:none">Stop</button>
            </div>
          </div>
        </div>

        <div class="panel panel-stat" id="statSection">
          <div class="panel-header">
            <span class="panel-title">
              Auto Stats
              <span class="pvp-badge off" id="statBadge">OFF</span>
            </span>
          </div>
          <div class="stat-current" id="statDisplay"></div>
          <div class="stat-plan" id="statPlanUI">
            <div class="stat-goals" id="statGoals"></div>
            <button class="stat-add-btn" id="statAddGoalBtn" onclick="addStatGoal()">+ Add priority goal</button>
            <div class="stat-default-row">
              <span class="stat-default-label">Remaining points go to</span>
              <select id="statDefaultStat" class="stat-select">
                <option value="stamina" selected>Stamina</option>
                <option value="attack">Attack</option>
                <option value="defense">Defense</option>
              </select>
            </div>
          </div>
          <div class="stat-actions">
            <button class="btn btn-sm btn-pvp" id="statStartBtn" onclick="startStats()">Start Allocating</button>
            <button class="btn btn-sm btn-red" id="statStopBtn" onclick="stopStats()" style="display:none">Stop</button>
          </div>
        </div>
      </div>

      <div class="dashboard" id="dashboard">
        <div class="stat-card" data-accent="red">
          <div class="stat-val" id="stKilled">0</div>
          <div class="stat-lbl">Killed</div>
        </div>
        <div class="stat-card" data-accent="purple">
          <div class="stat-val" id="stDmg">0</div>
          <div class="stat-lbl">Damage</div>
        </div>
        <div class="stat-card" data-accent="green">
          <div class="stat-val" id="stStam">0</div>
          <div class="stat-lbl">Stamina</div>
        </div>
        <div class="stat-card" data-accent="amber">
          <div class="stat-val" id="stLooted">0</div>
          <div class="stat-lbl">Looted</div>
        </div>
        <div class="stat-card" data-accent="blue">
          <div class="stat-val" id="stTime">00:00</div>
          <div class="stat-lbl">Uptime</div>
        </div>
      </div>

      <section class="wave-section">
        <div class="section-header">
          <div class="wave-pills" id="wavePills"></div>
          <div class="section-actions">
            <button class="btn btn-xs btn-ghost" onclick="toggleCurrentWave(true)">All On</button>
            <button class="btn btn-xs btn-ghost" onclick="toggleCurrentWave(false)">All Off</button>
          </div>
        </div>
        <div class="wave-count-row" id="waveCountRow"></div>
        <div class="waves-container" id="wavesContainer">
          <div class="empty" id="wavesEmpty"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg><div>Connect to load monsters</div></div>
        </div>
      </section>
    </div>

    <div class="tab-page" id="tab-guild" hidden>
      <div class="panel-section">
        <div class="panel panel-quest" id="questSection">
          <div class="panel-header">
            <span class="panel-title">
              Quests
              <span class="pvp-badge off" id="questBadge">OFF</span>
            </span>
          </div>
          <div class="panel-body quest-panel-body">
            <span class="quest-info" id="questDisplay"></span>
            <div class="quest-controls">
              <button class="btn btn-sm btn-quest" id="questStartBtn" onclick="startQuest()">Start Quests</button>
              <button class="btn btn-sm btn-red" id="questStopBtn" onclick="stopQuest()" style="display:none">Stop</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="tab-page" id="tab-events" hidden>
      <div id="eventsGridView">
        <div class="section-header">
          <div class="section-title"><span>Core Activities</span></div>
        </div>
        <div class="events-grid" id="eventsGrid"></div>
      </div>
      <div id="eventsDetailView" hidden>
        <button class="btn btn-ghost btn-sm event-back-btn" onclick="closeEvent()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          Back to Events
        </button>
        <div id="eventDetailContent"></div>
      </div>
    </div>

    <div class="tab-page" id="tab-logs" hidden>
      <section class="log-section" id="logSection">
        <div class="log-header">
          <span class="log-title">Activity Log</span>
          <button class="btn btn-xs btn-ghost" onclick="clearLog()">Clear</button>
        </div>
        <div class="log-box" id="logBox"></div>
      </section>
    </div>
  </main>

  <div class="action-bar" id="actionBar">
    <button class="btn btn-start" id="startBtn" onclick="start()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>
      Start Farming
    </button>
    <button class="btn btn-stop" id="stopBtn" onclick="stop()" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="5" width="14" height="14" rx="1.5"/></svg>
      Stop
    </button>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
