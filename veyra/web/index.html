<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veyra Bot</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">
      <div class="logo-icon">&#9876;</div>
      <h1>Veyra Bot<br><span>Priority Mode</span></h1>
    </div>
    <div class="header-right">
      <div class="status"><span class="dot" id="dot"></span><span id="statusText">Offline</span></div>
      <button class="btn btn-ghost btn-sm" onclick="toggleSettings()">&#9881;</button>
      <button class="btn btn-primary" id="connectBtn" onclick="connect()">Connect</button>
    </div>
  </div>

  <div class="dashboard" id="dashboard">
    <div class="stat-box"><div class="stat-val" id="stKilled">0</div><div class="stat-lbl">Killed</div></div>
    <div class="stat-box"><div class="stat-val" id="stDmg">0</div><div class="stat-lbl">Damage</div></div>
    <div class="stat-box"><div class="stat-val" id="stStam">0</div><div class="stat-lbl">Stamina</div></div>
    <div class="stat-box"><div class="stat-val" id="stLooted">0</div><div class="stat-lbl">Looted</div></div>
    <div class="stat-box"><div class="stat-val" id="stTime">00:00</div><div class="stat-lbl">Time</div></div>
  </div>

  <div class="settings" id="settingsPanel">
    <div class="settings-grid">
      <div class="field"><label>Email</label><input type="text" id="email" value=""></div>
      <div class="field"><label>Password</label><input type="password" id="password" value=""></div>
    </div>
  </div>

  <div class="wave-section">
    <div class="wave-header">
      <div class="wave-title"><span class="num w1">W1</span> Wave 1</div>
      <div class="wave-right">
        <button class="btn btn-ghost btn-sm" onclick="toggleWave('w1grid',true)">All On</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleWave('w1grid',false)">All Off</button>
        <span class="wave-badge" id="w1badge"></span>
      </div>
    </div>
    <div class="monster-grid" id="w1grid">
      <div class="empty" id="w1empty"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg><div>Connect to load monsters</div></div>
    </div>
  </div>

  <div class="wave-section">
    <div class="wave-header">
      <div class="wave-title"><span class="num w2">W2</span> Wave 2</div>
      <div class="wave-right">
        <button class="btn btn-ghost btn-sm" onclick="toggleWave('w2grid',true)">All On</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleWave('w2grid',false)">All Off</button>
        <span class="wave-badge" id="w2badge"></span>
      </div>
    </div>
    <div class="monster-grid" id="w2grid">
      <div class="empty" id="w2empty"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg><div>Connect to load monsters</div></div>
    </div>
  </div>

  <div class="profile-section">
    <div class="profile-header">
      <span class="profile-title">Profiles</span>
      <div class="profile-actions">
        <select id="profileSelect" class="f-profile">
          <option value="">-- Profiles --</option>
        </select>
        <button class="btn btn-ghost btn-sm" onclick="loadProfile()">Load</button>
        <button class="btn btn-ghost btn-sm" onclick="saveProfile()">Save</button>
        <button class="btn btn-ghost btn-sm" onclick="deleteProfile()">Delete</button>
      </div>
    </div>
  </div>

  <div class="pvp-section" id="pvpSection">
    <div class="pvp-header">
      <div class="pvp-left">
        <span class="pvp-icon">&#9876;&#xFE0E;</span>
        <span class="pvp-title">Solo PvP</span>
        <span class="pvp-badge" id="pvpBadge">OFF</span>
      </div>
      <div class="pvp-right">
        <span class="pvp-stat" id="pvpStat"></span>
        <button class="btn btn-sm btn-pvp-start" id="pvpStartBtn" onclick="startPvP()">Start PvP</button>
        <button class="btn btn-sm btn-red" id="pvpStopBtn" onclick="stopPvP()" style="display:none">Stop PvP</button>
      </div>
    </div>
  </div>

  <div class="action-bar">
    <button class="btn btn-green" id="startBtn" onclick="start()">&#9654;&#xFE0E; Start</button>
    <button class="btn btn-red" id="stopBtn" onclick="stop()" disabled>&#9632;&#xFE0E; Stop</button>
  </div>

  <div class="log-section">
    <div class="log-header">
      <span class="log-title">Activity Log</span>
      <button class="btn btn-ghost btn-sm" onclick="clearLog()">Clear</button>
    </div>
    <div class="log-box" id="logBox"></div>
  </div>

</div>
<script src="/static/app.js"></script>
</body>
</html>
